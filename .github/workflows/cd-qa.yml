name: CD - Deploy to QA

on:
  push:
    branches: [develop]
    paths-ignore:
      - '**.md'
      - '.github/instructions/**'

permissions:
  contents: read

concurrency:
  group: deploy-qa
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 1. CI gate (reutilizar el workflow de CI)
  # ─────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ─────────────────────────────────────────────
  # 2. Deploy Laravel + Python a Elastika VPS (QA)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Elastika VPS (QA)
    runs-on: ubuntu-latest
    needs: ci
    environment: qa

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js (build assets)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Deploy via SSH (Orquestador)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e

            APP_DIR="${{ secrets.VPS_APP_DIR_QA }}"
            export VPS_APP_DIR="$APP_DIR"
            export PATH="/usr/local/php82/bin:/usr/local/python311/bin:/usr/local/bin:$PATH"

            cd "$APP_DIR"

            # 1. Pull rama develop
            git fetch origin develop
            git reset --hard origin/develop

            # 2. Ejecutar deploy (sin pull redundante)
            chmod +x deploy/orchestrate.sh
            bash deploy/orchestrate.sh deploy --skip-pull

      - name: Upload compiled assets via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "public/build/"
          target: "${{ secrets.VPS_APP_DIR_QA }}"
          overwrite: true

      - name: Health check (services + API)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            export VPS_APP_DIR="${{ secrets.VPS_APP_DIR_QA }}"
            export PATH="/usr/local/php82/bin:/usr/local/python311/bin:/usr/local/bin:$PATH"

            cd "$VPS_APP_DIR"

            # Mostrar estado + salud vía orquestador
            bash deploy/orchestrate.sh status
